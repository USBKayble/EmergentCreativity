# =============================================================================
# EmergentCreativity – Reward / Punishment Ruleset
# =============================================================================
# Edit this file to tune the tenant's behaviour WITHOUT any programming.
# Every entry under "rules" has these optional fields:
#
#   event     : internal event key fired by the environment
#   reward    : points added (positive) or subtracted (negative) when fired
#   per_step  : if true the reward is applied every simulation step
#                while the condition is active (instead of once on trigger)
#   condition : optional expression that must be true for the rule to fire
#
# Reward structure:
#   - Vitals decline continuously (handled in code, not here)
#   - Action rewards: positive for completing desired actions
#   - Direction rewards: positive for moving toward solutions (handled in code)
# =============================================================================

rules:

  # ── Cleanliness ─────────────────────────────────────────────────────────────
  - name: pick_up_mess
    event: picked_up_mess
    reward: 5.0

  - name: place_item_tidily
    event: placed_item_on_surface
    reward: 2.0

  - name: clean_surface
    event: cleaned_surface
    reward: 3.0

  - name: mess_on_floor_penalty
    per_step: true
    condition: "mess_count > 0"
    reward: -0.1

  # ── Hunger & Eating ──────────────────────────────────────────────────────────
  - name: eat_food
    event: ate_food
    reward: 10.0

  # ── Energy / Sleep ───────────────────────────────────────────────────────────
  - name: sleep_reward
    event: sleeping
    per_step: true
    reward: 1.5

  # ── Entertainment (action rewards) ────────────────────────────────────────────
  - name: watch_tv
    event: watching_tv
    per_step: true
    reward: 0.8

  - name: read_book
    event: reading_book
    per_step: true
    reward: 1.0

  - name: play_game
    event: playing_game
    per_step: true
    reward: 1.2

  # ── Laziness ─────────────────────────────────────────────────────────────────
  - name: idle_penalty
    per_step: true
    condition: "idle_steps > 100"
    reward: -0.2

  # ── Hygiene ──────────────────────────────────────────────────────────────────
  - name: use_bathroom
    event: used_bathroom
    reward: 4.0

  - name: failed_bathroom
    event: failed_bathroom_attempt
    reward: -3.0

# =============================================================================
# Vitals configuration – how fast each vital changes over time
# =============================================================================
vitals:
  hunger_rate:   0.0002
  energy_drain:  0.0001
  energy_regen:  0.0005
  bladder_rate:  0.00015
  happiness_decay: 0.00005

# =============================================================================
# Terminal conditions – disabled for continuous training
# =============================================================================
terminal:
  hunger_max: 100.0
  energy_min: -100.0
  max_steps: 999999999

# =============================================================================
# Observation space settings
# =============================================================================
observation:
  vision_width:  84
  vision_height: 84
  vision_fov:    90
  hearing_radius: 10.0
  smell_radius:   3.0
