# =============================================================================
# EmergentCreativity – Reward / Punishment Ruleset
# =============================================================================
# Edit this file to tune the tenant's behaviour WITHOUT any programming.
# Every entry under "rules" has these optional fields:
#
#   event     : internal event key fired by the environment
#   reward    : points added (positive) or subtracted (negative) when fired
#   per_step  : if true the reward is applied every simulation step
#                while the condition is active (instead of once on trigger)
#   condition : optional expression that must be true for the rule to fire
#               supported variables: hunger, energy, happiness, mess_count,
#               idle_steps, is_eating, is_sleeping, is_watching_tv,
#               is_reading, holding_food, holding_mess, surface_clean
#
# Rewards are summed each step and passed to the neural network.
# =============================================================================

rules:

  # ── Cleanliness ─────────────────────────────────────────────────────────────
  - name: pick_up_mess
    event: picked_up_mess
    reward: 5.0

  - name: place_item_tidily
    event: placed_item_on_surface
    reward: 2.0

  - name: clean_surface
    event: cleaned_surface
    reward: 3.0

  - name: mess_on_floor_penalty
    per_step: true
    condition: "mess_count > 0"
    reward: -0.1          # small per-step penalty per mess item

  - name: heavy_mess_penalty
    per_step: true
    condition: "mess_count > 5"
    reward: -0.3          # additional per-step penalty when very messy

  # ── Hunger & Eating ──────────────────────────────────────────────────────────
  - name: eat_food
    event: ate_food
    reward: 10.0

  - name: hungry_penalty
    per_step: true
    condition: "hunger > 0.6"
    reward: -0.5          # hunger is 0–1; high hunger is bad

  - name: starving_penalty
    per_step: true
    condition: "hunger > 0.85"
    reward: -1.5          # severe starvation

  # ── Energy / Sleep ───────────────────────────────────────────────────────────
  - name: sleep_reward
    event: sleeping
    per_step: true
    reward: 1.5

  - name: tired_penalty
    per_step: true
    condition: "energy < 0.25"
    reward: -0.4

  - name: exhausted_penalty
    per_step: true
    condition: "energy < 0.1"
    reward: -1.0

  # ── Entertainment ────────────────────────────────────────────────────────────
  - name: watch_tv
    event: watching_tv
    per_step: true
    reward: 0.8

  - name: read_book
    event: reading_book
    per_step: true
    reward: 1.0

  - name: play_game
    event: playing_game
    per_step: true
    reward: 1.2

  # ── Laziness ─────────────────────────────────────────────────────────────────
  - name: idle_penalty
    per_step: true
    condition: "idle_steps > 100"
    reward: -0.2

  - name: prolonged_idle_penalty
    per_step: true
    condition: "idle_steps > 300"
    reward: -0.5

  # ── Social / Happiness ───────────────────────────────────────────────────────
  - name: low_happiness_penalty
    per_step: true
    condition: "happiness < 0.3"
    reward: -0.3

  - name: high_happiness_reward
    per_step: true
    condition: "happiness > 0.75"
    reward: 0.2

  # ── Hygiene ──────────────────────────────────────────────────────────────────
  - name: use_bathroom
    event: used_bathroom
    reward: 4.0

  - name: bladder_full_penalty
    per_step: true
    condition: "bladder > 0.8"
    reward: -0.6

# =============================================================================
# Vitals configuration – how fast each vital changes over time
# =============================================================================
vitals:
  hunger_rate:   0.0002   # hunger increase per simulation step
  energy_drain:  0.0001   # energy decrease per step (awake)
  energy_regen:  0.0005   # energy increase per step (sleeping)
  bladder_rate:  0.00015  # bladder fill rate per step
  happiness_decay: 0.00005

# =============================================================================
# Terminal conditions – episode ends if any of these trigger
# =============================================================================
terminal:
  hunger_max: 1.0         # episode ends if hunger reaches 1.0 (starvation)
  energy_min: 0.0         # episode ends if energy reaches 0.0 (collapse)
  max_steps: 50000        # max steps per episode

# =============================================================================
# Observation space settings
# =============================================================================
observation:
  vision_width:  84
  vision_height: 84
  vision_fov:    90        # degrees
  hearing_radius: 10.0    # metres
  smell_radius:   3.0
