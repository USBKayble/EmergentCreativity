name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" flake8

      - name: Lint with flake8
        run: |
          # Stop the build if there are syntax errors or undefined names
          flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues but don't fail the build
          flake8 src tests --count --exit-zero --max-line-length=120 --statistics

      - name: Security checks
        run: |
          pip install bandit
          bandit -r src/ -ll

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

  auto-merge:
    name: Auto-merge PR on CI success
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Merge PR and delete branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;

            core.info(`PR #${pr.number}: all checks passed – merging.`);

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash'
              });
              core.info(`PR #${pr.number} merged successfully.`);

              // Delete the branch if it's not from a fork
              if (pr.head.repo && pr.head.repo.full_name === context.repo.full_name) {
                try {
                  await github.rest.git.deleteRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: `heads/${pr.head.ref}`
                  });
                  core.info(`Branch ${pr.head.ref} deleted successfully.`);
                } catch (deleteError) {
                  core.warning(`Could not delete branch ${pr.head.ref}: ${deleteError.message}`);
                }
              }
            } catch (mergeError) {
              core.error(`Failed to merge PR #${pr.number}: ${mergeError.message}`);
            }
