name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" flake8

      - name: Lint with flake8
        run: |
          # Stop the build if there are syntax errors or undefined names
          flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues but don't fail the build
          flake8 src tests --count --exit-zero --max-line-length=120 --statistics

      - name: Security checks
        run: |
          pip install bandit
          bandit -r src/ -ll

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing
