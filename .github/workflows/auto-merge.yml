name: Auto-Merge on CI Pass

on:
  # Fires whenever a check suite completes on a PR
  check_suite:
    types: [completed]
  # Also fires on each individual check-run completion (covers matrix jobs)
  check_run:
    types: [completed]

jobs:
  auto-merge:
    name: Merge PR when all checks pass
    runs-on: ubuntu-latest
    # Only act when the suite/run succeeded
    if: >
      (github.event_name == 'check_suite' &&
       github.event.check_suite.conclusion == 'success') ||
      (github.event_name == 'check_run' &&
       github.event.check_run.conclusion == 'success')
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Enable auto-merge for associated open PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sha =
              github.event_name === 'check_suite'
                ? context.payload.check_suite.head_sha
                : context.payload.check_run.head_sha;

            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            for (const pr of pulls) {
              if (pr.head.sha !== sha) continue;
              if (pr.draft) continue;

              // Check that *all* check runs for this commit have succeeded
              const { data: checks } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: sha,
              });

              const allPassed = checks.check_runs.every(
                (run) =>
                  run.status === 'completed' &&
                  (run.conclusion === 'success' || run.conclusion === 'skipped' || run.conclusion === 'neutral')
              );

              if (!allPassed) {
                core.info(`PR #${pr.number}: not all checks passed yet – skipping.`);
                continue;
              }

              core.info(`PR #${pr.number}: all checks passed – enabling auto-merge.`);
              await github.graphql(`
                mutation($pullRequestId: ID!, $mergeMethod: PullRequestMergeMethod!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: $mergeMethod
                  }) {
                    pullRequest { number }
                  }
                }
              `, {
                pullRequestId: pr.node_id,
                mergeMethod: 'SQUASH',
              });
            }
